<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nolan Groves — Resume</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .links a {
      color: #a8b4d8;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 4px 10px;
      border: 1px solid #3a4a7a;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }

    .links a:hover {
      background: #3a4a7a;
      color: #fff;
    }

    object {
      flex: 1;
      width: 100%;
      border: none;
    }

    .fallback {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: #555;
    }

    .fallback a {
      color: #1a1a2e;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <header>
    <h1>Nolan Groves — Resume</h1>
    <nav class="links">
      <a href="Resume.pdf" download>Download PDF</a>
    </nav>
  </header>
  <object data="Resume.pdf" type="application/pdf">
    <div class="fallback">
      <p>PDF preview unavailable in this browser.</p>
      <a href="Resume.pdf" download>Download Resume.pdf</a>
    </div>
  </object>
</body>
</html>
