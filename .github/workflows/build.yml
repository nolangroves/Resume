name: Build Resume PDF

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra

      - name: Build PDF
        run: |
          pdflatex -interaction=nonstopmode -jobname=Resume Resume.tex
          pdflatex -interaction=nonstopmode -jobname=Resume Resume.tex

      - name: Build variant PDFs
        run: |
          for f in variants/*.tex; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .tex)
            pdflatex -interaction=nonstopmode -jobname="Resume_${name}" "\input{${f}}"
            pdflatex -interaction=nonstopmode -jobname="Resume_${name}" "\input{${f}}"
          done

      - name: Commit built PDF to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Resume.pdf
          git diff --staged --quiet || git commit -m "ci: update Resume.pdf [skip ci]"
          git push

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdfs
          path: "*.pdf"
          retention-days: 90
