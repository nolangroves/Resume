name: Build Resume PDFs

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra

      - name: Build visual PDF
        run: |
          pdflatex -interaction=nonstopmode -jobname=Resume_Visual Resume.tex
          pdflatex -interaction=nonstopmode -jobname=Resume_Visual Resume.tex

      - name: Build ATS PDF
        run: |
          pdflatex -interaction=nonstopmode -jobname=Resume_ATS "\def\ATSMODE{1}\input{Resume}"
          pdflatex -interaction=nonstopmode -jobname=Resume_ATS "\def\ATSMODE{1}\input{Resume}"

      - name: Build variant PDFs
        # Builds any .tex file found in variants/
        run: |
          for f in variants/*.tex; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .tex)
            pdflatex -interaction=nonstopmode -jobname="Resume_${name}" "\input{${f}}"
            pdflatex -interaction=nonstopmode -jobname="Resume_${name}" "\input{${f}}"
            pdflatex -interaction=nonstopmode -jobname="Resume_${name}_ATS" "\def\ATSMODE{1}\input{${f}}"
            pdflatex -interaction=nonstopmode -jobname="Resume_${name}_ATS" "\def\ATSMODE{1}\input{${f}}"
          done

      - name: Commit built PDFs to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Resume_Visual.pdf Resume_ATS.pdf
          git diff --staged --quiet || git commit -m "ci: update built PDFs [skip ci]"
          git push

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdfs
          path: "*.pdf"
          retention-days: 90
